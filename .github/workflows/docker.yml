name: Docker

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build & size budget
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: concerto:ci-test
      # 100 MB. Sprint 3 §C.1: the original ROADMAP §8 target was 50 MB,
      # but a stripped concerto-cli with axum + reqwest + tokio + the
      # full nvml-wrapper feature set lands at ~85–95 MB on Linux x86_64.
      # 100 MB still keeps the image trivial to pull (a few seconds on a
      # residential connection) while accommodating the real binary
      # size. Revisit if the binary grows materially.
      MAX_IMAGE_BYTES: 104857600
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Assert image size under budget
        run: |
          set -euo pipefail
          size="$(docker image inspect "${IMAGE_TAG}" --format='{{.Size}}')"
          printf 'concerto image size: %s bytes (budget: %s)\n' "${size}" "${MAX_IMAGE_BYTES}"
          if [ "${size}" -ge "${MAX_IMAGE_BYTES}" ]; then
            echo "::error::Image size ${size} bytes exceeds the ${MAX_IMAGE_BYTES}-byte budget."
            exit 1
          fi

      - name: Smoke test (--help)
        run: docker run --rm "${IMAGE_TAG}" --help
