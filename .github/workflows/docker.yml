name: Docker

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build & size budget
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: concerto:ci-test
      # 50 MB. Sprint 3 §C.1 / ROADMAP §8 exit criterion.
      MAX_IMAGE_BYTES: 52428800
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Assert image size < 50 MB
        run: |
          set -euo pipefail
          size="$(docker image inspect "${IMAGE_TAG}" --format='{{.Size}}')"
          printf 'concerto image size: %s bytes (budget: %s)\n' "${size}" "${MAX_IMAGE_BYTES}"
          if [ "${size}" -ge "${MAX_IMAGE_BYTES}" ]; then
            echo "::error::Image size ${size} bytes exceeds the 50 MB budget (${MAX_IMAGE_BYTES} bytes)."
            exit 1
          fi

      - name: Smoke test (--help)
        run: docker run --rm "${IMAGE_TAG}" --help
