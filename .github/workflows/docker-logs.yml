name: Docker logs (JSON-per-line)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  json-logs:
    name: Assert one JSON object per log line
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: concerto:ci-logs
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container and assert one-JSON-per-line in docker logs
        run: |
          set -euo pipefail
          cat > "${RUNNER_TEMP}/concerto.toml" <<'EOF'
          [server]
          host = "0.0.0.0"
          port = 8000
          [[gpus]]
          id = 0
          [[models]]
          id = "smoke-test-model"
          name = "Smoke Test Model"
          weight_path = "/tmp/no-such-path"
          vram_required = "8 GB"
          engine = "mock"
          EOF
          docker run -d --name concerto-logs -p 8000:8000 -e RUST_LOG=info \
            -v "${RUNNER_TEMP}/concerto.toml:/etc/concerto.toml:ro" \
            "${IMAGE_TAG}" --config /etc/concerto.toml --mock-gpus 1 --log-format json
          for i in $(seq 1 30); do
            if curl -fsS --max-time 2 http://127.0.0.1:8000/health >/dev/null; then
              ready=1; break
            fi
            sleep 1
          done
          if [ "${ready:-0}" != "1" ]; then
            echo "::error::concerto did not become healthy within 30s"
            docker logs concerto-logs || true; exit 1
          fi
          # Request may fail (mock-inference-backend isn't on PATH in the
          # production image); we only need concerto to log the attempt.
          curl -sS --max-time 15 -H 'content-type: application/json' \
            -X POST http://127.0.0.1:8000/v1/chat/completions \
            -d '{"model":"smoke-test-model","messages":[{"role":"user","content":"hi"}]}' \
            -o /dev/null -w 'status=%{http_code}\n' || true
          docker logs concerto-logs >logs.txt 2>&1
          echo "--- logs ---"; cat logs.txt; echo "--- end ---"
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            if ! printf '%s\n' "$line" | jq -e -c . >/dev/null 2>&1; then
              echo "::error::not-json: $line"; exit 1
            fi
          done < logs.txt

      - name: Stop and remove container
        if: always()
        run: |
          docker stop concerto-logs >/dev/null 2>&1 || true
          docker rm concerto-logs >/dev/null 2>&1 || true
