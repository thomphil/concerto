name: CI

on:
  push:
  pull_request:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-D warnings"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy (nvml feature)
        # Verifies the NVML code path compiles against the same warnings
        # budget. The `nvml` feature's NVML-linking code is itself gated on
        # `target_os = "linux"` inside `concerto-gpu`, so the GitHub
        # ubuntu-latest runner (which has no NVIDIA driver) still
        # compiles — the feature is a no-op at runtime but the wiring must
        # stay clean.
        run: cargo clippy --all-targets -p concerto-cli --features nvml -- -D warnings

      - name: Build
        run: cargo build --all

      - name: Build (nvml feature)
        run: cargo build -p concerto-cli --features nvml

      - name: Test
        run: cargo test --all

  bench-rig-tests:
    name: Bench Rig Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build concerto binary
        run: cargo build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bench rig
        run: pip install -e tools/bench[dev]

      - name: Run bench rig tests
        run: pytest tools/bench/tests/ -v
